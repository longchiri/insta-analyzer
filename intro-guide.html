<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="logo.png" type="image/png"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>모임 소개글 생성기</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    /* ── 한국어 줄바꿈 글로벌 설정 ── */
    body{
      font-family:'Apple SD Gothic Neo','Segoe UI',sans-serif;
      background:linear-gradient(135deg,#f0fdf4,#dcfce7 60%,#f0fdf4);
      min-height:100vh;padding:28px 16px 60px;color:#1a1a1a;
      word-break:keep-all;       /* 한국어 단어 중간 안 잘림 */
      overflow-wrap:break-word;  /* 긴 영어/URL 줄바꿈 */
      -webkit-text-size-adjust:100%; /* iOS 폰트 자동 확대 방지 */
    }

    .back-wrap{max-width:760px;margin:0 auto 12px;}
    .back-btn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:#888;font-size:0.82rem;font-weight:600;background:#fff;border:1.5px solid #e5e5e5;border-radius:99px;padding:7px 16px;white-space:nowrap;}

    header{text-align:center;margin-bottom:24px;}
    header .logo{font-size:2.4rem;margin-bottom:6px;}
    header h1{font-size:1.7rem;font-weight:900;background:linear-gradient(90deg,#16a34a,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.3;}
    header p{color:#888;margin-top:5px;font-size:0.85rem;line-height:1.5;padding:0 8px;}
    .badge{display:inline-block;background:linear-gradient(90deg,#16a34a,#059669);color:#fff;font-size:0.7rem;font-weight:800;padding:3px 12px;border-radius:99px;margin-top:7px;line-height:1.5;}

    /* ── 스텝 박스 ── */
    .step-box{max-width:760px;margin:0 auto 14px;background:#fff;border-radius:18px;padding:18px 18px;border:1.5px solid #bbf7d0;box-shadow:0 4px 18px rgba(22,163,74,0.07);overflow:hidden;}
    .step-label{font-size:0.72rem;font-weight:800;letter-spacing:0.05em;margin-bottom:13px;display:flex;align-items:flex-start;gap:8px;line-height:1.4;}
    .step-num{width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.73rem;font-weight:900;color:#fff;flex-shrink:0;margin-top:1px;}

    /* ── 모임명 입력 ── */
    .name-input{width:100%;padding:12px 14px;border-radius:12px;border:2px solid #bbf7d0;background:#f0fdf4;font-size:0.95rem;font-weight:700;color:#14532d;outline:none;transition:border 0.2s;-webkit-appearance:none;}
    .name-input:focus{border-color:#16a34a;}
    .name-input::placeholder{color:#a7f3d0;font-weight:500;}

    /* ── 대분류 그리드 ── */
    .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
    .cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 8px;border-radius:14px;border:2px solid #e5e7eb;background:#f9fafb;cursor:pointer;transition:all 0.15s;font-size:0.77rem;font-weight:700;color:#555;line-height:1.3;word-break:keep-all;-webkit-appearance:none;}
    .cat-btn .cat-em{font-size:1.4rem;}
    .cat-btn.selected{border-color:#16a34a;background:#f0fdf4;color:#15803d;}

    /* ── 소분류 칩 ── */
    .sub-row{display:flex;flex-wrap:wrap;gap:7px;}
    .sub-chip{padding:7px 14px;border-radius:99px;border:2px solid #e5e7eb;background:#f9fafb;font-size:0.78rem;font-weight:700;color:#555;cursor:pointer;transition:all 0.15s;white-space:nowrap;-webkit-appearance:none;}
    .sub-chip.selected{background:#f0fdf4;border-color:#16a34a;color:#15803d;}

    /* ── 플랫폼 칩 ── */
    .platform-row{display:flex;flex-wrap:wrap;gap:8px;}
    .p-chip{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:99px;border:2px solid #e5e7eb;background:#f9fafb;font-size:0.82rem;font-weight:700;color:#555;cursor:pointer;transition:all 0.15s;white-space:nowrap;-webkit-appearance:none;}
    .p-chip.sel-daangn{background:#fff7ed;border-color:#FF6F0F;color:#FF6F0F;}
    .p-chip.sel-somoim{background:#f0fdf4;border-color:#16a34a;color:#16a34a;}
    .p-chip.sel-munto{background:#fdf4ff;border-color:#9333ea;color:#9333ea;}
    .p-chip.sel-openchat{background:#fffbeb;border-color:#d97706;color:#d97706;}
    .p-chip.sel-insta{background:#fdf2f8;border-color:#ec4899;color:#ec4899;}
    .insta-hint{font-size:0.71rem;color:#9ca3af;margin-top:9px;line-height:1.6;}

    /* ── 생성 버튼 ── */
    .gen-wrap{max-width:760px;margin:6px auto 20px;text-align:center;padding:0 16px;}
    .gen-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:15px 40px;background:linear-gradient(135deg,#16a34a,#059669);color:#fff;font-size:0.95rem;font-weight:900;border:none;border-radius:99px;cursor:pointer;box-shadow:0 6px 24px rgba(22,163,74,0.3);transition:transform 0.15s;max-width:100%;white-space:nowrap;}
    .gen-btn:hover{transform:translateY(-2px);}
    .gen-btn:disabled{opacity:0.4;transform:none;cursor:not-allowed;}

    /* ── 결과 탭 ── */
    #resultArea{max-width:760px;margin:0 auto 24px;display:none;}

    /* 탭바: 가로 스크롤 (모바일에서 탭 여러개여도 안 줄바꿈) */
    .tab-bar{display:flex;flex-wrap:nowrap;gap:5px;margin-bottom:0;padding:0 2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .tab-bar::-webkit-scrollbar{display:none;}
    .tab-btn{padding:9px 14px;border-radius:12px 12px 0 0;border:1.5px solid #e5e7eb;border-bottom:none;background:#f3f4f6;font-size:0.77rem;font-weight:700;color:#888;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;}
    .tab-btn.active{background:#fff;color:#14532d;border-color:#86efac;font-weight:900;}

    /* 탭 콘텐츠 */
    .tab-content{background:#fff;border:1.5px solid #86efac;border-radius:0 14px 14px 14px;padding:18px 16px;overflow:hidden;}
    .tab-pane{display:none;}
    .tab-pane.active{display:block;}

    /* ── 섹션 헤더 ── */
    .section-h{font-size:0.68rem;font-weight:800;letter-spacing:0.05em;margin:16px 0 9px;display:flex;align-items:center;gap:8px;white-space:nowrap;}
    .section-h::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#86efac,transparent);min-width:10px;}

    /* ── 제목 패턴 ── */
    .title-list{display:flex;flex-direction:column;gap:7px;}
    .title-item{background:#f8faff;border-left:3px solid #6366f1;border-radius:0 10px 10px 0;padding:9px 12px;font-size:0.79rem;color:#1a1a1a;line-height:1.55;word-break:keep-all;overflow-wrap:break-word;}
    .title-item .ti-label{font-size:0.64rem;color:#6366f1;font-weight:800;margin-bottom:2px;}

    /* ── 템플릿 영역 ── */
    .tpl-area{position:relative;background:#f9fafb;border-radius:12px;padding:44px 14px 14px 14px;border:1.5px solid #e5e7eb;overflow:hidden;}
    .tpl-pre{font-family:inherit;white-space:pre-wrap;font-size:0.77rem;line-height:1.9;color:#333;word-break:break-all;overflow-wrap:break-word;}
    .copy-btn{position:absolute;top:9px;right:9px;padding:5px 12px;border-radius:99px;border:1.5px solid #86efac;background:#f0fdf4;color:#15803d;font-size:0.7rem;font-weight:800;cursor:pointer;white-space:nowrap;}
    .copy-btn:hover{background:#dcfce7;}

    /* ── 팁 영역 ── */
    .tip-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
    .tip-good{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:12px;padding:12px;}
    .tip-bad{background:#fff5f5;border:1.5px solid #fca5a5;border-radius:12px;padding:12px;}
    .tip-head{font-size:0.7rem;font-weight:800;margin-bottom:7px;}
    .tip-li{font-size:0.73rem;color:#444;line-height:1.6;margin-bottom:4px;display:flex;gap:5px;word-break:keep-all;}

    /* ── 해시태그 ── */
    .tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
    .tag{padding:5px 10px;border-radius:99px;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.12s;white-space:nowrap;}
    .tag-major{background:#dbeafe;color:#1e40af;border:1.5px solid #93c5fd;}
    .tag-major:hover{background:#bfdbfe;}
    .tag-minor{background:#f3e8ff;color:#6b21a8;border:1.5px solid #d8b4fe;}
    .tag-minor:hover{background:#e9d5ff;}
    .tag-head{font-size:0.68rem;font-weight:800;color:#6b7280;margin-bottom:7px;margin-top:10px;word-break:keep-all;}
    .tag-copy-all{font-size:0.7rem;color:#16a34a;font-weight:800;cursor:pointer;margin-left:6px;}

    /* ── 스크롤 버튼 ── */
    .scroll-btns{position:fixed;bottom:20px;right:16px;z-index:100;}
    .scroll-btn{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,#16a34a,#059669);color:#fff;font-size:1rem;cursor:pointer;box-shadow:0 4px 12px rgba(22,163,74,0.3);}

    .hidden{display:none;}

    /* ── 모바일 전용 ── */
    @media(max-width:480px){
      body{padding:16px 12px 60px;}
      header .logo{font-size:2rem;}
      header h1{font-size:1.45rem;}
      header p{font-size:0.78rem;}
      .badge{font-size:0.64rem;padding:3px 10px;}
      .step-box{padding:14px 13px;border-radius:14px;}
      .step-label{font-size:0.67rem;letter-spacing:0;}
      .name-input{font-size:0.88rem;padding:11px 12px;}
      .cat-grid{grid-template-columns:repeat(3,1fr);gap:6px;}
      .cat-btn{padding:10px 6px;font-size:0.72rem;}
      .cat-btn .cat-em{font-size:1.25rem;}
      .sub-chip{padding:6px 12px;font-size:0.74rem;}
      .p-chip{padding:8px 12px;font-size:0.78rem;gap:5px;}
      .gen-btn{padding:13px 28px;font-size:0.88rem;width:100%;}
      .tab-btn{padding:8px 12px;font-size:0.73rem;}
      .tab-content{padding:14px 12px;}
      .section-h{font-size:0.63rem;}
      .title-item{font-size:0.75rem;padding:8px 10px;}
      .tpl-area{padding:40px 12px 12px 12px;}
      .tpl-pre{font-size:0.72rem;line-height:1.8;}
      .copy-btn{font-size:0.65rem;padding:4px 9px;}
      .tip-row{grid-template-columns:1fr;}
      .tip-li{font-size:0.7rem;}
      .tag{font-size:0.68rem;padding:4px 8px;}
      .insta-hint{font-size:0.67rem;}
    }
  </style>
</head>
<body>

<div class="back-wrap"><a href="index.html" class="back-btn">← 홈으로</a></div>

<header>
  <div class="logo">🖊️</div>
  <h1>소개글 생성기</h1>
  <p>모임명 입력 → 카테고리 → 플랫폼 선택하면 소개글이 한번에!</p>
  <span class="badge">4플랫폼 + 인스타캡션 + 해시태그 메이저·마이너</span>
</header>

<!-- STEP 1 -->
<div class="step-box" id="step1">
  <div class="step-label">
    <div class="step-num" style="background:#16a34a;">1</div>
    <span style="color:#16a34a;">우리 모임 이름을 입력해주세요</span>
  </div>
  <input class="name-input" id="nameInput" type="text" placeholder="예) 서울 월요 러닝크루, 직장인 재테크 스터디 …" oninput="onNameInput()"/>
</div>

<!-- STEP 2 -->
<div class="step-box" id="step2">
  <div class="step-label">
    <div class="step-num" style="background:#6366f1;">2</div>
    <span style="color:#6366f1;">어떤 카테고리 모임인가요? (대분류)</span>
  </div>
  <div class="cat-grid" id="catGrid"></div>
</div>

<!-- STEP 3 -->
<div class="step-box hidden" id="step3">
  <div class="step-label">
    <div class="step-num" style="background:#9333ea;">3</div>
    <span style="color:#9333ea;">구체적인 유형을 선택하세요 (소분류)</span>
  </div>
  <div class="sub-row" id="subRow"></div>
</div>

<!-- STEP 4 -->
<div class="step-box hidden" id="step4">
  <div class="step-label">
    <div class="step-num" style="background:#d97706;">4</div>
    <span style="color:#d97706;">올릴 플랫폼을 선택하세요 (복수 선택 가능)</span>
  </div>
  <div class="platform-row">
    <button class="p-chip" id="chip-daangn"  onclick="togglePlatform('daangn',this)">🥕 당근모임</button>
    <button class="p-chip" id="chip-somoim"  onclick="togglePlatform('somoim',this)">🤝 소모임</button>
    <button class="p-chip" id="chip-munto"   onclick="togglePlatform('munto',this)">🎭 문토</button>
    <button class="p-chip" id="chip-openchat"onclick="togglePlatform('openchat',this)">💬 오픈채팅</button>
    <button class="p-chip" id="chip-insta"   onclick="togglePlatform('insta',this)">📸 인스타그램</button>
  </div>
  <div class="insta-hint">📸 인스타그램 선택 시 캡션 + 해시태그(메이저·마이너)가 별도 탭으로 생성돼요</div>
</div>

<!-- 생성 버튼 -->
<div class="gen-wrap">
  <button class="gen-btn" id="genBtn" disabled onclick="generateAll()">✨ 소개글 한번에 만들기</button>
</div>

<!-- 결과 -->
<div id="resultArea">
  <div style="text-align:center;margin-bottom:10px;">
    <button onclick="generateAll()" style="display:inline-flex;align-items:center;gap:7px;padding:10px 24px;background:#fff;border:2px solid #16a34a;border-radius:99px;color:#16a34a;font-size:0.84rem;font-weight:800;cursor:pointer;transition:all .15s;" onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background='#fff'">🔄 다른 버전 생성</button>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div class="tab-content" id="tabContent"></div>
</div>

<div class="scroll-btns">
  <button class="scroll-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
</div>

<script>
const PLATFORMS={
  daangn:{label:'🥕 당근모임',color:'#FF6F0F',bg:'#fff7ed',border:'#FF6F0F',sel:'sel-daangn'},
  somoim:{label:'🤝 소모임',color:'#16a34a',bg:'#f0fdf4',border:'#16a34a',sel:'sel-somoim'},
  munto:{label:'🎭 문토',color:'#9333ea',bg:'#fdf4ff',border:'#9333ea',sel:'sel-munto'},
  openchat:{label:'💬 오픈채팅',color:'#d97706',bg:'#fffbeb',border:'#d97706',sel:'sel-openchat'},
  insta:{label:'📸 인스타그램',color:'#ec4899',bg:'#fdf2f8',border:'#ec4899',sel:'sel-insta'},
};
const CATS=[
  {id:'sports',emoji:'🏃',label:'운동/스포츠'},
  {id:'reading',emoji:'📚',label:'독서/인문'},
  {id:'food',emoji:'🍳',label:'요리/맛집'},
  {id:'language',emoji:'🗣️',label:'언어/스터디'},
  {id:'culture',emoji:'🎭',label:'문화/예술'},
  {id:'selfdev',emoji:'💰',label:'자기계발'},
  {id:'social',emoji:'🤝',label:'사교/친목'},
];
const SUBS={
  sports:['러닝크루','배드민턴','등산·트레킹','클라이밍','테니스·골프','헬스·요가'],
  reading:['자유독서','재테크독서','고전·철학','글쓰기클럽','특정작가'],
  food:['소셜쿠킹','맛집탐방','카페투어','베이킹·제과'],
  language:['영어회화','원서읽기','일본어','언어교환'],
  culture:['전시·미술관','영화·드라마','공연·연극','사진'],
  selfdev:['재테크·주식','부동산임장','AI활용','창업·사이드'],
  social:['동네친구','2030친목','직장인친목','반려동물'],
};
const SUB_CUSTOM={
  '러닝크루':{extra:'📍 코스: [공원] 일주 5~8km\n⚡ 페이스: 무관 (걷기구간 있어요)\n🍜 달리고 맛집 뒤풀이 있어요!',tip:'페이스 무관 + 뒤풀이 언급이 핵심',avoid:'페이스 조건 엄격 설정'},
  '배드민턴':{extra:'🏸 코트: [체육관명] ([지역])\n💡 라켓 없어도 OK (빌려드려요)\n👥 2인1조 복식 위주',tip:'라켓 빌려드린다 명시 → 초보 유입',avoid:'코트 비용 불명확 (이탈 원인 1위)'},
  '등산·트레킹':{extra:'⛰️ 코스: [산 이름] ([난이도])\n🚌 집결: [지하철역] [시간]\n🍱 하산 후 뒤풀이 있어요',tip:'난이도 + 집결지 명확히 = 신청률 상승',avoid:'난이도 없이 "아무나 OK"'},
  '클라이밍':{extra:'🧗 센터: [클라이밍장명] ([지역])\n💪 레벨: [V0~V3 / 입문자]\n👟 암벽화 없어도 대여 가능',tip:'레벨 명시 + 암벽화 대여 안내 필수',avoid:'레벨 미명시'},
  '테니스·골프':{extra:'🎾 장소: [테니스장/골프장] ([지역])\n💰 비용: [회당 금액]\n📊 레벨: [초급/중급]',tip:'비용 + 레벨 두 가지는 반드시 명시',avoid:'비용 "협의"'},
  '헬스·요가':{extra:'💪 장소: [헬스장/스튜디오명]\n⏰ 시간: [요일] [시간대]\n🧘 레벨: [입문/초급/전체]',tip:'강사 유무 + 레벨 명시가 신뢰 만듦',avoid:'강사 수준 불명확'},

let selCat=null,selSub=null,selPlatforms=new Set();

function onNameInput(){updateBtn();}
function renderCats(){
  const g=document.getElementById('catGrid');
  if(g.childElementCount>0)return;
  g.innerHTML=CATS.map(c=>`<button class="cat-btn" onclick="selectCat('${c.id}',this)"><span class="cat-em">${c.emoji}</span><span>${c.label}</span></button>`).join('');
}
function selectCat(cid,el){
  selCat=cid;selSub=null;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  renderSubs();show('step3');hide('step4');hideResult();updateBtn();
}
function renderSubs(){
  document.getElementById('subRow').innerHTML=SUBS[selCat].map(s=>`<button class="sub-chip" onclick="selectSub('${s}',this)">${s}</button>`).join('');
}
function selectSub(s,el){
  selSub=s;
  document.querySelectorAll('.sub-chip').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  show('step4');hideResult();updateBtn();
}
function togglePlatform(pid,el){
  if(selPlatforms.has(pid)){selPlatforms.delete(pid);el.className='p-chip';}
  else{selPlatforms.add(pid);el.className='p-chip sel-'+pid;}
  updateBtn();
}
function updateBtn(){
  const name=document.getElementById('nameInput').value.trim();
  document.getElementById('genBtn').disabled=!(name&&selCat&&selSub&&selPlatforms.size>0);
}
function hideResult(){document.getElementById('resultArea').style.display='none';}

function generateAll(){
  const moim=document.getElementById('nameInput').value.trim();
  const catObj=CATS.find(c=>c.id===selCat);
  const sub=selSub;
  const cd=SUB_CUSTOM[sub]||{};
  const el=((cd.extra||'').split('\n'));
  const e1=el[0]||`🔹 [${sub} 관련 장소/조건 추가]`;
  const e2=el[1]||`🔹 [${sub} 관련 특이사항 추가]`;

  const tabBar=document.getElementById('tabBar');
  const tabContent=document.getElementById('tabContent');
  tabBar.innerHTML='';tabContent.innerHTML='';

  [...selPlatforms].forEach((pid,i)=>{
    const p=PLATFORMS[pid];
    const isFirst=i===0;
    const btn=document.createElement('button');
    btn.className='tab-btn'+(isFirst?' active':'');
    btn.textContent=p.label;
    btn.onclick=()=>switchTab(pid);
    btn.id='tab-btn-'+pid;
    tabBar.appendChild(btn);

    const pane=document.createElement('div');
    pane.className='tab-pane'+(isFirst?' active':'');
    pane.id='tab-pane-'+pid;

    if(pid==='insta'){pane.innerHTML=buildInstaPane(moim,catObj,sub,cd);}
    else{
      const key=`${pid}-${selCat}`;
      const base=BASE[key];
      if(!base){pane.innerHTML=`<p style="color:#888;padding:20px;text-align:center;">해당 조합의 템플릿을 준비 중이에요.</p>`;}
      else{pane.innerHTML=buildPane(pid,base,moim,catObj,sub,e1,e2,cd);}
    }
    tabContent.appendChild(pane);
  });

  document.getElementById('resultArea').style.display='block';
  setTimeout(()=>document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

  const pool = [...(PROMO_POOL[pid]||[]), ...(PROMO_EXTRA[pid]||[])];

  return chosen.replace(/\[모임명\]/g, moim).replace(/\[소분류\]/g, sub).replace(/\[이모지\]/g, emoji);
}

function buildPane(pid,base,moim,catObj,sub,e1,e2,cd){
  const p=PLATFORMS[pid];
  const key=`${pid}-${selCat}`;
  // 랜덤 템플릿 선택 (BASE + ALT1 + ALT2 통합 풀)
  const tplPool=[base.template,...(ALT_TEMPLATES[key]||[]),...(ALT_TEMPLATES_2[key]||[]),...(ALT_TEMPLATES_3[key]||[])];
  const chosenTpl=tplPool[Math.floor(Math.random()*tplPool.length)];
  let tpl=chosenTpl.replace(/\[모임명\]/g,moim).replace(/\[이모지\]/g,catObj.emoji).replace(/\[소분류\]/g,sub).replace('[extra1]',e1).replace('[extra2]',e2);
  // 제목 패턴 섞기 (BASE + EXTRA + MORE + TITLES_3 통합 풀)
  const allTitles=[...base.titles,...(EXTRA_TITLES[key]||[]),...(MORE_TITLES[key]||[]),...(TITLES_3[key]||[])];
  for(let i=allTitles.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[allTitles[i],allTitles[j]]=[allTitles[j],allTitles[i]];}
  const titlesHtml=allTitles.map(t=>`<div class="title-item"><div class="ti-label">${t.label}</div>${t.text.replace(/\[모임명\]/g,moim).replace(/\[이모지\]/g,catObj.emoji).replace(/\[소분류\]/g,sub)}</div>`).join('');
  const tipsHtml=[...base.tips,...(cd.tip?[cd.tip]:[])].map(t=>`<div class="tip-li"><span>✅</span>${t}</div>`).join('');
  const avoidHtml=[...base.avoid,...(cd.avoid?[cd.avoid]:[])].map(a=>`<div class="tip-li"><span>❌</span>${a}</div>`).join('');
  const n=base.note;
  const promo=makePromo(pid,moim,sub,catObj.emoji);
  const promoHtml=promo?`<div class="section-h" style="color:#d97706;margin-top:20px;">📢 ${pid==='daangn'?'동네생활 홍보 게시글':pid==='somoim'?'신규 멤버 환영 메시지':pid==='munto'?'소셜링 모집 공고':'채팅방 고정 공지'}</div><div class="tpl-area"><button class="copy-btn" style="border-color:#fed7aa;background:#fff7ed;color:#c2410c;" onclick="copyTpl(this)">복사 📋</button><pre class="tpl-pre">${escHtml(promo)}</pre></div>`:'';
  return `<div class="section-h" style="color:#6366f1;">📌 잘 되는 제목 패턴</div><div class="title-list">${titlesHtml}</div><div class="section-h" style="color:#16a34a;margin-top:18px;">📝 소개글 템플릿</div><div class="tpl-area"><button class="copy-btn" onclick="copyTpl(this)">복사 📋</button><pre class="tpl-pre">${escHtml(tpl)}</pre></div>${promoHtml}<div class="tip-row"><div class="tip-good"><div class="tip-head" style="color:#15803d;">⚡ 이게 핵심이에요</div>${tipsHtml}</div><div class="tip-bad"><div class="tip-head" style="color:#dc2626;">🚫 이러면 망해요</div>${avoidHtml}</div></div><div style="background:${n.bg};border-left:4px solid ${n.border};color:${n.color};border-radius:10px;padding:11px 14px;margin-top:14px;font-size:0.77rem;line-height:1.7;"><strong>${p.label} 핵심 포인트</strong><br/>${n.text}</div>`;
}

  const minorAll=catHash.minor.slice(0,10);
  const majorHtml=majorAll.map(t=>`<span class="tag tag-major" onclick="copyTag(this,'${t}')">${t}</span>`).join('');
  const minorHtml=minorAll.map(t=>`<span class="tag tag-minor" onclick="copyTag(this,'${t}')">${t}</span>`).join('');
  const allTags=[...majorAll,...minorAll].join(' ');
  return `
<div class="section-h" style="color:#ec4899;">✍️ 피드 캡션</div>
<div class="tpl-area"><button class="copy-btn" style="border-color:#fbcfe8;background:#fdf2f8;color:#be185d;" onclick="copyTpl(this)">복사 📋</button><pre class="tpl-pre">${escHtml(cap)}</pre></div>

<div class="section-h" style="color:#d97706;margin-top:18px;">📱 스토리 / 릴스 문구</div>
<div style="font-size:0.7rem;color:#9ca3af;margin-bottom:8px;">스토리 텍스트 or 릴스 오버레이에 바로 쓸 수 있어요</div>
<div class="tpl-area"><button class="copy-btn" style="border-color:#fed7aa;background:#fff7ed;color:#c2410c;" onclick="copyTpl(this)">복사 📋</button><pre class="tpl-pre">${escHtml(story)}</pre></div>

<div class="section-h" style="color:#1e40af;margin-top:18px;">🔵 메이저 해시태그 <span class="tag-copy-all" onclick="copyStr('${escAttr(majorAll.join(' '))}')">전체 복사</span></div>
<div class="tag-head">검색량 높은 인기 태그 — 노출이 넓어요</div>
<div class="tag-row">${majorHtml}</div>
<div class="section-h" style="color:#6b21a8;margin-top:6px;">🟣 마이너 해시태그 <span class="tag-copy-all" onclick="copyStr('${escAttr(minorAll.join(' '))}')">전체 복사</span></div>
<div class="tag-head">니치 + 관심도 높은 태그 — 저장·팔로우 전환에 유리해요</div>
<div class="tag-row">${minorHtml}</div>
<div style="margin-top:12px;"><button class="copy-btn" style="position:static;display:inline-block;background:#f3f4f6;border-color:#d1d5db;color:#374151;" onclick="copyStr('${escAttr(allTags)}')">📋 해시태그 전체 복사 (${majorAll.length+minorAll.length}개)</button></div>
<div style="background:#fdf2f8;border-left:4px solid #ec4899;color:#9d174d;border-radius:10px;padding:11px 14px;margin-top:14px;font-size:0.77rem;line-height:1.7;"><strong>인스타그램 핵심 포인트</strong><br/>메이저 5~7개 + 마이너 8~10개 조합이 최적이에요. 태그는 캡션 맨 끝이나 댓글에 넣고, 저장수를 높이는 정보성 캡션이 도달을 늘려요.</div>`;
}

function switchTab(pid){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  const b=document.getElementById('tab-btn-'+pid);
  const p=document.getElementById('tab-pane-'+pid);
  if(b)b.classList.add('active');
  if(p)p.classList.add('active');
}
function copyTpl(btn){
  const pre=btn.nextElementSibling;
  navigator.clipboard.writeText(pre.textContent).then(()=>{const o=btn.textContent;btn.textContent='복사됨 ✅';setTimeout(()=>btn.textContent=o,2000);});
}
function copyTag(el,tag){navigator.clipboard.writeText(tag).then(()=>{const o=el.textContent;el.textContent='✅';setTimeout(()=>el.textContent=o,1500);});}
function copyStr(s){navigator.clipboard.writeText(s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'"));}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return s.replace(/'/g,'&#39;').replace(/"/g,'&quot;');}
function show(id){document.getElementById(id).style.display='';document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).style.display='none';}
renderCats();
</script>
</body>
</html>
