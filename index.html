<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram 계정 분석기 (Ver 2.7)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #f5f0ff 0%, #fff0f5 100%);
      min-height: 100vh;
      padding: 30px 16px;
      color: #222;
    }
    header { text-align: center; margin-bottom: 30px; }
    header h1 {
      font-size: 1.8rem;
      background: linear-gradient(90deg, #833ab4, #fd1d1d, #fcb045);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .card {
      background: #fff; border-radius: 16px; padding: 24px;
      margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      max-width: 600px; margin-left: auto; margin-right: auto;
    }

    .tab-wrap { display: flex; gap: 8px; max-width: 600px; margin: 0 auto 20px; }
    .tab-btn {
      flex: 1; padding: 12px; border: 2px solid #e5e5e5; background: #fff;
      border-radius: 12px; font-weight: 600; cursor: pointer; color: #888;
    }
    .tab-btn.active { border-color: #c13584; color: #c13584; background: #fff0f8; }

    .upload-zone {
      border: 2px dashed #c13584; border-radius: 14px; padding: 30px;
      text-align: center; cursor: pointer; background: #fdf5ff;
    }
    #fileInput { display: none; }

    .parsed-preview { background: #f8f9ff; border: 1px solid #c3d0ff; border-radius: 12px; padding: 15px; margin-top: 15px; display: none; }
    .parsed-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
    .p-val { font-size: 1.2rem; font-weight: 800; color: #c13584; }
    .p-label { font-size: 0.75rem; color: #888; }

    .btn-analyze {
      display: block; width: 100%; max-width: 600px; margin: 0 auto 10px;
      padding: 16px; background: linear-gradient(90deg, #833ab4, #fd1d1d, #fcb045);
      color: #fff; font-size: 1rem; font-weight: 700; border: none; border-radius: 14px; cursor: pointer;
    }
    
    #btn-pdf {
      display: none; width: 100%; max-width: 600px; margin: 0 auto 30px;
      padding: 12px; background: #333; color: #fff; border: none; border-radius: 14px; cursor: pointer;
    }

    #result { display: none; max-width: 600px; margin: 0 auto; }
    .result-card { background: #fff; border-radius: 16px; padding: 25px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .score-box { text-align: center; padding: 20px; background: #fff0f8; border-radius: 14px; margin-bottom: 15px; }
    .score-number { font-size: 3rem; font-weight: 900; color: #c13584; }
    
    .reco-item { display: flex; gap: 10px; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; }
    .reco-keep { background: #f0fff4; color: #276749; }
    .reco-add { background: #ebf8ff; color: #2c5282; }
    .reco-fix { background: #fffbeb; color: #744210; }

    .tag-area { font-family: monospace; background: #f4f4f4; padding: 10px; border-radius: 8px; margin-top: 5px; color: #c13584; font-weight: bold; }
  </style>
</head>
<body>

<header>
  <p style="color:#ccc;">by longchiri</p>
  <h1>Instagram 계정 분석기</h1>
</header>

<div class="tab-wrap">
  <button class="tab-btn active" onclick="switchTab('upload')">📂 ZIP 파일 분석</button>
  <button class="tab-btn" onclick="switchTab('manual')">✏️ 직접 입력</button>
</div>

<div id="section-upload">
  <div class="card">
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <h3>📁 인스타 ZIP 파일 선택</h3>
      <p style="font-size: 0.8rem; color: #888; margin-top: 5px;">내 정보 다운로드에서 받은 파일을 그대로 올려주세요</p>
    </div>
    <input type="file" id="fileInput" accept=".zip" onchange="handleFileSelect(event)" />

    <div class="parsed-preview" id="parsedPreview">
      <h4 style="margin-bottom:10px; font-size:0.9rem;">📊 ZIP에서 추출된 실제 데이터</h4>
      <div class="parsed-grid">
        <div><div class="p-val" id="p-followers">0</div><div class="p-label">팔로워</div></div>
        <div><div class="p-val" id="p-following">0</div><div class="p-label">팔로잉</div></div>
        <div><div class="p-val" id="p-posts">0</div><div class="p-label">게시물</div></div>
      </div>
    </div>
  </div>

  <div class="card" id="extraCard" style="display:none;">
    <h3 style="font-size:1rem; margin-bottom:15px;">🔍 추가 정보 (분석 정확도 향상)</h3>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <div>
        <label style="font-size:0.8rem;">콘텐츠 주제</label>
        <input type="text" id="u-niche" placeholder="카페, 일상, 개발 등" style="width:100%; padding:8px; margin-top:5px; border-radius:6px; border:1px solid #ddd;">
      </div>
      <div>
        <label style="font-size:0.8rem;">평균 좋아요(직접입력)</label>
        <input type="number" id="u-likes" placeholder="예: 50" style="width:100%; padding:8px; margin-top:5px; border-radius:6px; border:1px solid #ddd;">
      </div>
    </div>
  </div>
</div>

<div id="section-manual" style="display:none;">
  <div class="card">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <input type="number" id="m-followers" placeholder="팔로워 수" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
      <input type="number" id="m-likes" placeholder="평균 좋아요" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
      <input type="text" id="m-niche" placeholder="주제 (예: 맛집)" style="padding:10px; border:1px solid #ddd; border-radius:8px; grid-column: span 2;">
    </div>
  </div>
</div>

<button class="btn-analyze" onclick="analyze()">🔍 데이터 분석 및 보고서 생성</button>
<button id="btn-pdf" onclick="downloadPDF()">📄 PDF 리포트 다운로드</button>

<div id="result">
  <div class="result-card">
    <h2 style="text-align:center; margin-bottom:15px;">📱 Instagram 분석 리포트</h2>
    <div class="score-box">
      <div class="score-number" id="res-score">0</div>
      <div style="font-weight:700; color:#c13584;">종합 지수</div>
    </div>
    <p id="res-summary" style="text-align:center; font-size:0.9rem; color:#666;"></p>
  </div>

  <div class="result-card">
    <h3 style="font-size:1rem; margin-bottom:12px;">💡 성장을 위한 가이드</h3>
    <div id="reco-list"></div>
  </div>

  <div class="result-card">
    <h3 style="font-size:1rem; margin-bottom:12px;">#️⃣ 추천 해시태그 전략</h3>
    <p style="font-size:0.85rem; color:#666; margin-bottom:10px;">회원님의 주제와 인스타그램 알고리즘을 반영한 최적 조합입니다.</p>
    <div id="hashtag-area" class="tag-area"></div>
  </div>
</div>

<script>
let currentTab = 'upload';
let zipData = { followers: 0, following: 0, posts: 0 };

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('section-upload').style.display = tab === 'upload' ? 'block' : 'none';
  document.getElementById('section-manual').style.display = tab === 'manual' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

async function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;

  try {
    const zip = await JSZip.loadAsync(file);
    
    // 1. 팔로워 파일 파싱 (followers_1.json)
    const followerFile = zip.file(/followers_1.json/i)[0] || zip.file(/followers.json/i)[0];
    if (followerFile) {
      const content = JSON.parse(await followerFile.async("string"));
      zipData.followers = Array.isArray(content) ? content.length : (content.relationships_followers?.length || 0);
    }

    // 2. 팔로잉 파일 파싱 (following.json)
    const followingFile = zip.file(/following.json/i)[0];
    if (followingFile) {
      const content = JSON.parse(await followingFile.async("string"));
      zipData.following = content.relationships_following?.length || 0;
    }

    // 3. 게시물 파일 파싱 (posts_1.json)
    const postsFile = zip.file(/posts_1.json/i)[0];
    if (postsFile) {
      const content = JSON.parse(await postsFile.async("string"));
      zipData.posts = content.length || 0;
    }

    // 화면 업데이트
    document.getElementById('p-followers').textContent = zipData.followers.toLocaleString();
    document.getElementById('p-following').textContent = zipData.following.toLocaleString();
    document.getElementById('p-posts').textContent = zipData.posts.toLocaleString();
    document.getElementById('parsedPreview').style.display = 'block';
    document.getElementById('extraCard').style.display = 'block';

  } catch (err) {
    alert("ZIP 파일을 읽는 중 오류가 발생했습니다. 인스타에서 받은 원본 파일이 맞는지 확인해주세요.");
  }
}

function analyze() {
  let f, l, niche;
  if (currentTab === 'upload') {
    f = zipData.followers;
    l = parseInt(document.getElementById('u-likes').value || 0);
    niche = document.getElementById('u-niche').value;
  } else {
    f = parseInt(document.getElementById('m-followers').value || 0);
    l = parseInt(document.getElementById('m-likes').value || 0);
    niche = document.getElementById('m-niche').value;
  }

  if (f === 0) { alert("팔로워 데이터가 없습니다."); return; }

  // 로직 계산
  const er = ((l / f) * 100).toFixed(2); // 인게이지먼트율
  const score = Math.min(100, (er * 10) + 40);

  document.getElementById('res-score').textContent = Math.floor(score);
  document.getElementById('res-summary').innerHTML = `현재 인게이지먼트율은 <b>${er}%</b>입니다.<br>팔로워 대비 반응도가 ${er > 3 ? '매우 우수' : '개선 가능'}한 상태입니다.`;

  // 추천 가이드
  let recoHtml = '';
  recoHtml += `<div class="reco-item reco-keep">✅ 현재 ${f.toLocaleString()}명의 팔로워와 소통 중입니다.</div>`;
  if (er < 2) {
    recoHtml += `<div class="reco-item reco-fix">⚠️ 게시물 도달 대비 좋아요가 적습니다. 질문형 캡션을 사용해보세요.</div>`;
  }
  recoHtml += `<div class="reco-item reco-add">🚀 릴스(Reels)를 주 2회 업로드하여 외부 유입을 늘리세요.</div>`;
  document.getElementById('reco-list').innerHTML = recoHtml;

  // 해시태그 전략 (핵심 추가 사항)
  const baseTags = niche ? niche.split(',').map(t => `#${t.trim()}`) : ['#인스타', '#소통'];
  const trendingTags = ['#일상', '#daily', '#좋아요'];
  const mixTags = [...baseTags.slice(0,3), ...trendingTags].join(' ');
  
  document.getElementById('hashtag-area').innerHTML = `
    ${mixTags}<br><br>
    <span style="color:#666; font-size:0.75rem;">팁: 위 해시태그와 함께 게시물 내용과 직접 관련된 태그 3개를 추가하는 것이 가장 효과적입니다.</span>
  `;

  document.getElementById('result').style.display = 'block';
  document.getElementById('btn-pdf').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

function downloadPDF() {
  const element = document.getElementById('result');
  const opt = {
    margin: 10,
    filename: 'Insta_Analysis_Report.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  html2pdf().set(opt).from(element).save();
}
</script>
</body>
</html>
