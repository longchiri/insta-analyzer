<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>모임 운영 가이드 | Longchiri</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f8f6f3;min-height:100vh;color:#1a1a2e;word-break:keep-all;overflow-wrap:break-word;-webkit-text-size-adjust:100%;}
    a{text-decoration:none;color:inherit;}

    .page-header{background:linear-gradient(135deg,#1a1a2e 0%,#2d2d5e 100%);padding:18px 16px 22px;color:#fff;text-align:center;}
    .back-btn{display:inline-flex;align-items:center;gap:5px;color:#c0c0e8;font-size:.78rem;margin-bottom:9px;}
    .page-title{font-size:1.3rem;font-weight:800;margin-bottom:4px;}
    .page-sub{font-size:.76rem;color:#a5b4fc;}

    .content{max-width:700px;margin:0 auto;padding:20px 14px 64px;}

    /* Step cards */
    .step-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .step-label{font-size:.68rem;font-weight:800;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .step-badge{background:#1a1a2e;color:#fff;border-radius:99px;padding:2px 8px;font-size:.65rem;font-weight:800;}

    /* Category grid */
    .cat-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;}
    .cat-btn{background:#f9fafb;border:2px solid #e5e7eb;border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:all .18s;user-select:none;width:calc(25% - 6px);min-width:72px;max-width:110px;}
    .cat-btn:hover{border-color:#c4b5fd;background:#faf5ff;}
    .cat-btn.active{border-color:#7c3aed;background:#ede9fe;}
    .cat-btn .ce{font-size:1.3rem;display:block;margin-bottom:3px;}
    .cat-btn .cl{font-size:.67rem;font-weight:700;color:#374151;line-height:1.3;}
    .cat-btn.active .cl{color:#6d28d9;}
    @media(max-width:400px){.cat-btn{width:calc(33% - 5px);min-width:62px;}}

    /* Sub-category (STEP 1.5) */
    #subcatCard{display:none;animation:fadeIn .25s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .subcat-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;}
    .sub-btn{background:#f9fafb;border:2px solid #e5e7eb;border-radius:99px;padding:6px 12px;cursor:pointer;font-size:.72rem;font-weight:700;color:#374151;transition:all .18s;user-select:none;display:flex;align-items:center;gap:4px;white-space:nowrap;}
    .sub-btn:hover{border-color:#c4b5fd;background:#faf5ff;color:#6d28d9;}
    .sub-btn.active{border-color:#7c3aed;background:#ede9fe;color:#6d28d9;}
    .sub-badge-new{background:#f59e0b;color:#fff;font-size:.55rem;font-weight:900;padding:1px 5px;border-radius:99px;margin-left:2px;}
    .subcat-hint{font-size:.68rem;color:#9ca3af;margin-top:8px;}

    /* Platform grid */
    .plt-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
    .plt-btn{border:2px solid #e5e7eb;border-radius:10px;padding:9px 4px;cursor:pointer;text-align:center;transition:all .18s;background:#fff;user-select:none;}
    .plt-btn .pe{font-size:1.2rem;display:block;margin-bottom:2px;}
    .plt-btn .pl{font-size:.62rem;font-weight:700;color:#374151;line-height:1.3;}

    /* Generate button */
    .gen-wrap{text-align:center;margin:6px 0 4px;}
    .gen-btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:99px;padding:13px 32px;font-size:.9rem;font-weight:800;cursor:pointer;transition:all .18s;opacity:.4;pointer-events:none;}
    .gen-btn.ready{opacity:1;pointer-events:all;}
    .gen-btn.ready:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,.35);}

    /* Result section */
    #result{display:none;}
    .result-head{border-radius:14px;padding:16px 18px;color:#fff;margin-bottom:2px;display:flex;align-items:center;gap:12px;}
    .rh-icon{font-size:1.6rem;flex-shrink:0;}
    .rh-name{font-size:1rem;font-weight:800;}
    .rh-sub{font-size:.72rem;opacity:.85;margin-top:2px;}

    /* Section accordion */
    .sec-list{border:1px solid #e5e7eb;border-top:none;border-radius:0 0 14px 14px;overflow:hidden;margin-bottom:18px;}
    .sec{border-top:1px solid #f0f0f0;}
    .sec:first-child{border-top:none;}
    .sec-head{display:flex;align-items:center;gap:9px;padding:13px 15px;cursor:pointer;background:#fff;user-select:none;transition:background .15s;}
    .sec-head:hover{background:#fafafa;}
    .s-icon{font-size:1rem;flex-shrink:0;}
    .s-title{font-size:.86rem;font-weight:700;flex:1;color:#111827;}
    .s-arr{font-size:.9rem;color:#9ca3af;transition:transform .2s;flex-shrink:0;}
    .sec.open .s-arr{transform:rotate(90deg);}
    .sec-body{display:none;background:#f9fbff;padding:4px 15px 15px;}
    .sec.open .sec-body{display:block;}

    /* Content inside */
    .ck-list{list-style:none;margin-top:8px;}
    .ck-list li{display:flex;gap:8px;padding:6px 0;font-size:.8rem;color:#374151;border-bottom:1px solid #f0f0f0;line-height:1.55;}
    .ck-list li:last-child{border-bottom:none;}
    .ck-num{flex-shrink:0;width:19px;height:19px;border-radius:50%;font-size:.62rem;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;}

    .bl{list-style:none;margin-top:8px;}
    .bl li{display:flex;gap:8px;padding:5px 0;font-size:.8rem;color:#374151;border-bottom:1px solid #f0f0f0;line-height:1.55;}
    .bl li:last-child{border-bottom:none;}
    .bl li::before{content:'•';font-weight:900;flex-shrink:0;margin-top:1px;}

    .wk-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px;}
    .wk-card{background:#fff;border:1.5px solid #e5e7eb;border-radius:9px;padding:10px 11px;}
    .wk-day{font-size:.7rem;font-weight:800;margin-bottom:3px;}
    .wk-txt{font-size:.74rem;color:#374151;line-height:1.5;}

    .cr-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px;}
    .cr-card{background:#fff;border:1.5px solid #fee2e2;border-radius:9px;padding:10px 11px;}
    .cr-title{font-size:.72rem;font-weight:700;color:#ef4444;margin-bottom:3px;}
    .cr-body{font-size:.74rem;color:#374151;line-height:1.5;}

    .alg{background:#fff;border:1.5px solid #e5e7eb;border-radius:9px;padding:10px 12px;margin-top:8px;}
    .alg-title{font-size:.73rem;font-weight:700;margin-bottom:4px;}
    .alg-body{font-size:.74rem;color:#374151;line-height:1.6;}

    .tip-box{border-radius:10px;padding:10px 12px;margin-top:8px;border:1.5px solid;}
    .tip-box-title{font-size:.73rem;font-weight:800;margin-bottom:4px;}
    .tip-box-body{font-size:.74rem;line-height:1.6;}

    @media(max-width:480px){
      .cat-btn{width:calc(33% - 5px);min-width:60px;}
      .plt-grid{grid-template-columns:repeat(5,1fr);}
      .plt-btn .pl{display:none;}
      .wk-grid,.cr-grid{grid-template-columns:1fr;}
      .ck-list li,.bl li,.wk-txt,.cr-body,.alg-body,.tip-box-body{font-size:.78rem;}
    }
  </style>
</head>

<div class="page-header">

  <!-- Step 2 -->
  <div class="step-card">

  <!-- Generate -->
  <div class="gen-wrap">

  </div>

  <!-- Result -->
  <div id="result"></div>

</div>

function renderSubcats(catId){
  const card = document.getElementById('subcatCard');
  const grid = document.getElementById('subcatGrid');
  const title = document.getElementById('subcatTitle');
  const subs = SUBCATS[catId];
  if(!subs || subs.length===0){ card.style.display='none'; return; }
  const catObj = CATS.find(c=>c.id===catId);
  title.textContent = catObj ? catObj.label+' — 세부 유형 선택' : '세부 유형 선택';
  selSubCat = null;
  grid.innerHTML = subs.map(s=>`
    <button class="sub-btn" data-subid="${s.id}" onclick="selectSubcat('${s.id}','${catId}')">
      <span>${s.emoji}</span>${s.label}
    </button>`).join('');
  card.style.display='';
}

function selectSubcat(subId, catId){
  selSubCat = subId;
  document.querySelectorAll('.sub-btn').forEach(x=>{
    x.classList.toggle('active', x.dataset.subid===subId);
  });
}

// Render category buttons
(function(){
  const g = document.getElementById('catGrid');
  CATS.forEach(c=>{
    const b = document.createElement('button');
    b.className='cat-btn';
    b.dataset.id=c.id;
    b.innerHTML=`<span class="ce">${c.emoji}</span><span class="cl">${c.label}</span>`;
    b.onclick=()=>{
      selCat=c.id; selSubCat=null;
      document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      renderSubcats(c.id);
      checkReady();
    };
    g.appendChild(b);
  });
})();

// Render platform buttons
(function(){
  const g = document.getElementById('pltGrid');
  PLTS.forEach(p=>{
    const b = document.createElement('button');
    b.className='plt-btn';
    b.dataset.id=p.id;
    b.style.cssText=`border-color:${p.color}20;`;
    b.innerHTML=`<span class="pe">${p.emoji}</span><span class="pl">${p.label}</span>`;
    b.onclick=()=>{
      selPlt=p.id;
      document.querySelectorAll('.plt-btn').forEach(x=>{ x.classList.remove('active'); x.style.background='#fff'; x.style.borderColor=PLTS.find(pp=>pp.id===x.dataset.id).color+'20'; });
      b.classList.add('active');
      b.style.background=p.color+'18';
      b.style.borderColor=p.color;
      b.querySelector('.pl').style.color=p.color;
      checkReady();
    };
    g.appendChild(b);
  });
})();

function checkReady(){
  const btn = document.getElementById('genBtn');
  if(selCat && selPlt){ btn.classList.add('ready'); } else { btn.classList.remove('ready'); }
}

function tog(head){
  head.parentElement.classList.toggle('open');
}

function buildGuide(){
  if(!selCat||!selPlt) return;
  const cat = CAT_DATA[selCat];
  const plt = PLT_DATA[selPlt];
  const catObj = CATS.find(c=>c.id===selCat);
  const pltObj = PLTS.find(p=>p.id===selPlt);
  const subData = selSubCat && SUBCATS[selCat] ? SUBCATS[selCat].find(s=>s.id===selSubCat) : null;

  // Combined checklist (sub-cat checks inserted between cat and plt)
  const checkItems = [
    ...cat.checklist_specific,
    ...(subData ? subData.checks : []),
    ...plt.checklist_plt,
  ];
  // Combined routine
  const routineItems = [...cat.routine, ...plt.routine_plt];

  const subLabel = subData ? ` · ${subData.emoji} ${subData.label}` : '';

  const html = `
  <div class="result-head" style="background:${pltObj.bg}">
    <div class="rh-icon">${catObj.emoji}${subData?subData.emoji:''}${pltObj.emoji}</div>
    <div>
      <div class="rh-name">${catObj.label}${subLabel} × ${pltObj.label} 운영 전략</div>
      <div class="rh-sub">${catObj.label}${subLabel} 모임을 ${pltObj.label}에서 운영하는 맞춤 가이드</div>
    </div>
  </div>

  <!-- 카테고리 핵심 원칙 -->
  <div class="tip-box" style="background:${cat.tip.bg};border-color:${cat.tip.border};margin-bottom:2px;">
    <div class="tip-box-title" style="color:${cat.tip.color}">${cat.tip.title}</div>
    <div class="tip-box-body" style="color:#374151;">${cat.tip.body}</div>
  </div>

  ${subData ? `
  <!-- 세부 유형 전용 팁 -->
  <div class="tip-box" style="background:#f5f3ff;border-color:#a855f7;margin-bottom:2px;">
    <div class="tip-box-title" style="color:#7c3aed">${subData.emoji} ${subData.label} 핵심 전략</div>
    <div class="tip-box-body" style="color:#374151;">${subData.tip}</div>
  </div>` : ''}

  <div class="sec-list">

    <!-- 창설 체크리스트 -->
    <div class="sec open">
      <div class="sec-head" onclick="tog(this)">
        <span class="s-icon">📋</span><span class="s-title">창설 체크리스트</span><span class="s-arr">›</span>
      </div>
      <div class="sec-body">
        <ul class="ck-list">
          ${checkItems.map((item,i)=>`<li><span class="ck-num" style="background:${pltObj.color}">${i+1}</span>${item}</li>`).join('')}
        </ul>
      </div>
    </div>

    <!-- 주간 운영 루틴 -->
    <div class="sec">
      <div class="sec-head" onclick="tog(this)">
        <span class="s-icon">📅</span><span class="s-title">운영 루틴</span><span class="s-arr">›</span>
      </div>
      <div class="sec-body">
        <div class="wk-grid">
          ${routineItems.map(r=>`<div class="wk-card"><div class="wk-day" style="color:${pltObj.color}">${r.t}</div><div class="wk-txt">${r.c}</div></div>`).join('')}
        </div>
      </div>
    </div>

    <!-- 멤버 관리 -->
    <div class="sec">
      <div class="sec-head" onclick="tog(this)">
        <span class="s-icon">👥</span><span class="s-title">멤버 관리 매뉴얼</span><span class="s-arr">›</span>
      </div>
      <div class="sec-body">
        <ul class="bl" style="--bc:${pltObj.color}">
          ${cat.members.map(m=>`<li style="--bc:${pltObj.color}">${m}</li>`).join('')}
        </ul>
      </div>
    </div>

    <!-- 이탈 방지 -->
    <div class="sec">
      <div class="sec-head" onclick="tog(this)">
        <span class="s-icon">💊</span><span class="s-title">이탈 방지 전략</span><span class="s-arr">›</span>
      </div>
      <div class="sec-body">
        <ul class="bl">
          ${cat.retention.map(r=>`<li>${r}</li>`).join('')}
        </ul>
      </div>
    </div>

    <!-- 알고리즘 -->
    <div class="sec">
      <div class="sec-head" onclick="tog(this)">
        <span class="s-icon">🔍</span><span class="s-title">알고리즘 & 노출 전략</span><span class="s-arr">›</span>
      </div>
      <div class="sec-body">
        ${plt.algo.map(a=>`<div class="alg"><div class="alg-title" style="color:${pltObj.color}">${a.t}</div><div class="alg-body">${a.b}</div></div>`).join('')}
      </div>
    </div>

    <!-- 위기 대응 -->
    <div class="sec">
      <div class="sec-head" onclick="tog(this)">
        <span class="s-icon">🚨</span><span class="s-title">위기 대응 SOP</span><span class="s-arr">›</span>
      </div>
      <div class="sec-body">
        <div class="cr-grid">
          ${cat.crisis.map(c=>`<div class="cr-card"><div class="cr-title">⚡ ${c.t}</div><div class="cr-body">${c.b}</div></div>`).join('')}
        </div>
      </div>
    </div>

  </div>
  `;

  const r = document.getElementById('result');
  r.style.display='block';
  r.innerHTML=html;
  r.scrollIntoView({behavior:'smooth', block:'start'});
}
</script>
