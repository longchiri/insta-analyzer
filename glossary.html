<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="logo.png" type="image/png"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SNS 알고리즘 용어백과 — longchiri</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Apple SD Gothic Neo','Segoe UI',sans-serif;
      background:#f8f9ff;
      min-height:100vh;
      padding:36px 16px 64px;
      color:#1a1a2e;
    }

    /* ── 헤더 ── */
    header { text-align:center; margin-bottom:36px; }
    .back-btn {
      display:inline-flex; align-items:center; gap:6px;
      color:#888; font-size:0.82rem; text-decoration:none;
      background:#fff; border:1.5px solid #eee; border-radius:99px;
      padding:6px 14px; margin-bottom:20px;
      transition:background 0.2s;
    }
    .back-btn:hover { background:#f3f3f6; }
    header h1 {
      font-size:1.9rem; font-weight:900;
      background:linear-gradient(90deg,#833ab4,#fd1d1d,#fcb045);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:8px;
    }
    header p { color:#aaa; font-size:0.88rem; }

    /* ── 검색 ── */
    .search-wrap {
      max-width:720px; margin:0 auto 28px;
      position:relative;
    }
    .search-wrap input {
      width:100%; padding:14px 20px 14px 46px;
      border:2px solid #e5e5e5; border-radius:14px;
      font-size:0.95rem; outline:none;
      background:#fff; transition:border 0.2s;
      font-family:inherit;
    }
    .search-wrap input:focus { border-color:#833ab4; }
    .search-icon {
      position:absolute; left:16px; top:50%;
      transform:translateY(-50%); font-size:1.1rem; pointer-events:none;
    }
    #searchCount {
      text-align:center; font-size:0.78rem; color:#aaa;
      margin-top:8px; min-height:18px;
    }

    /* ── 플랫폼 필터 탭 ── */
    .filter-wrap {
      display:flex; gap:8px; flex-wrap:wrap;
      max-width:720px; margin:0 auto 24px;
      justify-content:center;
    }
    .filter-btn {
      padding:7px 18px; border-radius:99px;
      border:2px solid #e5e5e5; background:#fff;
      font-size:0.82rem; font-weight:700; color:#888;
      cursor:pointer; transition:all 0.18s;
    }
    .filter-btn.active { border-color:transparent; color:#fff; }
    .filter-btn[data-cat="all"].active    { background:#1a1a2e; }
    .filter-btn[data-cat="insta"].active  { background:linear-gradient(90deg,#833ab4,#fd1d1d); }
    .filter-btn[data-cat="daangn"].active { background:linear-gradient(90deg,#FF6F0F,#FFB347); }
    .filter-btn[data-cat="moim"].active   { background:linear-gradient(90deg,#16A34A,#EA580C); }
    .filter-btn[data-cat="kakao"].active  { background:linear-gradient(90deg,#c8a800,#FFD700); color:#3C1E1E; }

    /* ── 용어 카드 ── */
    .glossary-wrap {
      max-width:720px; margin:0 auto;
      display:flex; flex-direction:column; gap:12px;
    }
    .term-card {
      background:#fff; border-radius:16px;
      border:1.5px solid #ebebeb;
      overflow:hidden; transition:box-shadow 0.18s;
    }
    .term-card:hover { box-shadow:0 6px 24px rgba(0,0,0,0.08); }
    .term-header {
      display:flex; align-items:center; gap:12px;
      padding:16px 20px; cursor:pointer;
      user-select:none;
    }
    .term-platform {
      font-size:0.65rem; font-weight:800; padding:3px 9px;
      border-radius:99px; flex-shrink:0; white-space:nowrap;
    }
    .plat-insta  { background:#fd1d1d18; color:#c13584; }
    .plat-daangn { background:#FF6F0F18; color:#d45a00; }
    .plat-moim   { background:#16A34A18; color:#16A34A; }
    .plat-kakao  { background:#FEE50028; color:#8a7200; }
    .plat-common { background:#6366f118; color:#6366f1; }

    .term-name {
      font-size:1rem; font-weight:800; color:#111; flex:1;
    }
    .term-name .en {
      font-size:0.75rem; font-weight:500; color:#aaa; margin-left:6px;
    }
    .term-arrow {
      font-size:0.85rem; color:#ccc;
      transition:transform 0.22s;
    }
    .term-card.open .term-arrow { transform:rotate(180deg); }

    .term-body {
      display:none; padding:0 20px 18px;
      border-top:1px solid #f3f3f6;
    }
    .term-card.open .term-body { display:block; }

    .term-desc {
      font-size:0.88rem; color:#555; line-height:1.85;
      margin-top:14px;
    }
    .term-desc b { color:#333; }
    .term-desc .highlight {
      display:inline-block; background:#f9f0ff;
      border-radius:6px; padding:2px 7px;
      color:#833ab4; font-weight:700; font-size:0.85rem;
    }
    .term-desc .highlight.orange { background:#fff3e0; color:#d45a00; }
    .term-desc .highlight.green  { background:#f0fff4; color:#16A34A; }
    .term-desc .highlight.yellow { background:#fffde7; color:#8a7200; }
    .term-desc .highlight.blue   { background:#e8f4fd; color:#1a73e8; }

    .tip-box {
      margin-top:12px; background:#f9f9ff;
      border-left:3px solid #833ab4;
      border-radius:0 8px 8px 0;
      padding:10px 14px; font-size:0.82rem;
      color:#555; line-height:1.7;
    }
    .tip-box.orange { border-color:#FF6F0F; background:#fff8f3; }
    .tip-box.green  { border-color:#16A34A; background:#f0fff4; }
    .tip-box.yellow { border-color:#c8a800; background:#fffde7; }

    /* ── 섹션 구분 ── */
    .section-label {
      max-width:720px; margin:8px auto 4px;
      font-size:0.7rem; font-weight:700; color:#ccc;
      letter-spacing:0.1em; text-transform:uppercase;
      padding:0 4px;
    }

    .empty-state {
      text-align:center; color:#ccc; padding:48px 0;
      font-size:0.9rem;
    }

    footer {
      text-align:center; margin-top:48px;
      color:#ccc; font-size:0.76rem;
    }
  </style>
</head>
<body>

<header>
  <a class="back-btn" href="index.html">← 인스타 분석기로 돌아가기</a>
  <h1>📖 SNS 알고리즘 용어백과</h1>
  <p>인스타·당근·소모임·카카오 분석기에 나오는 핵심 용어를 쉽게 정리했어요</p>
</header>

<!-- 검색 -->
<div class="search-wrap">
  <span class="search-icon">🔎</span>
  <input type="text" id="searchInput" placeholder="용어 검색… (예: 릴스, 알고리즘, CTR)"/>
</div>
<div id="searchCount"></div>

<!-- 필터 -->
<div class="filter-wrap">
  <button class="filter-btn active" data-cat="all">전체</button>
  <button class="filter-btn" data-cat="insta">📸 인스타</button>
  <button class="filter-btn" data-cat="daangn">🥕 당근</button>
  <button class="filter-btn" data-cat="moim">🤝 소모임·문토</button>
  <button class="filter-btn" data-cat="kakao">💬 오픈채팅</button>
  <button class="filter-btn" data-cat="common">🌐 공통</button>
</div>

<!-- 용어 목록 -->
<div class="glossary-wrap" id="glossaryWrap"></div>

<div class="empty-state" id="emptyState" style="display:none;">검색 결과가 없어요 😢</div>

<footer>by <b style="color:#16A34A;">longchiri</b></footer>

<script>

  {
    cat:'common', name:'노출수', en:'Impressions',

  {

let currentCat = 'all';
let searchQuery = '';

function render() {
  const wrap = document.getElementById('glossaryWrap');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('searchCount');

  const filtered = TERMS.filter(t => {
    const matchCat = currentCat === 'all' || t.cat === currentCat;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q ||
      t.name.toLowerCase().includes(q) ||
      (t.en && t.en.toLowerCase().includes(q)) ||
      t.desc.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  if (searchQuery) {
    countEl.textContent = `"${searchQuery}" 검색 결과 ${filtered.length}개`;
  } else {
    countEl.textContent = '';
  }

  if (filtered.length === 0) {
    wrap.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  wrap.innerHTML = filtered.map((t, i) => {
    const platClass = {insta:'plat-insta', daangn:'plat-daangn', moim:'plat-moim', kakao:'plat-kakao', common:'plat-common'}[t.cat];
    const platLabel = {insta:'인스타', daangn:'당근', moim:'소모임·문토', kakao:'오픈채팅', common:'공통'}[t.cat];
    const tipColor = t.tipColor || '';
    return `
    <div class="term-card" id="card-${i}">
      <div class="term-header" onclick="toggleCard(${i})">
        <span class="term-platform ${platClass}">${platLabel}</span>
        <span class="term-name">${t.name}<span class="en">${t.en || ''}</span></span>
        <span class="term-arrow">▼</span>
      </div>
      <div class="term-body">
        <div class="term-desc">${t.desc}</div>
        ${t.tip ? `<div class="tip-box ${tipColor}">💡 ${t.tip}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(i) {
  const card = document.getElementById('card-' + i);
  card.classList.toggle('open');
}

// 필터 버튼
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });
});

// 검색
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

render();
</script>
